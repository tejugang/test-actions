name: Label via slash comment
on:
  issue_comment:
    types: [created]

jobs:
  add-label:
    if: startsWith(github.event.comment.body, '/') && !contains(github.event.comment.body, ' ')
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Verify maintainer and add label
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.comment.body.trim();
            const label = body.slice(1); // strip leading '/'

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: [label]
            });
