name: Label via slash comment
on:
  workflow_call: 

jobs:
  add-label:
    if: startsWith(github.event.comment.body, '/') && !contains(github.event.comment.body, ' ')
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Verify collaborator and add label
        uses: actions/github-script@v7
        with:
          script: |
            try {
              const body = context.payload.comment.body.trim();
              const label = body.slice(1);

              if (!label) return;

              let permission = 'none';
              try {
                const { data: permLevel } = await github.rest.repos.getCollaboratorPermissionLevel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  username: context.payload.comment.user.login,
                });
                permission = permLevel.permission;
              } catch (error) {
                console.log(`Could not fetch permission level: ${error.message}`);
                // permission stays 'none' — fail closed, not open
              }

              const allowed = ['admin', 'write'];
              if (!allowed.includes(permission)) {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  body: `@${context.payload.comment.user.login} You do not have sufficient permissions to add labels.`,
                });
                return;
              }

              const repoLabels = await github.paginate(github.rest.issues.listLabelsForRepo, {
                owner: context.repo.owner,
                repo: context.repo.repo,
              });
              const exists = repoLabels.some(l => l.name.toLowerCase() === label.toLowerCase());

              // Only allow labels that already exist in the repo
              if (!exists) {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  body: `@${context.payload.comment.user.login} Label \`${label}\` does not exist in this repo.`,
                });
                return;
              }

              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                labels: [label],
              });
              console.log(`Added label "${label}"`);

              // Remove needs-triage when triage/accepted is added
              if (label.toLowerCase() === 'triage/accepted') {
                const issueLabels = await github.rest.issues.listLabelsOnIssue({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                });
                const hasNeedsTriage = issueLabels.data.some(l => l.name.toLowerCase() === 'needs-triage');
                if (hasNeedsTriage) {
                  await github.rest.issues.removeLabel({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: context.issue.number,
                    name: 'needs-triage',
                  });
                  console.log('Removed label "needs-triage"');
                }
              }
            } catch (err) {
              core.setFailed(`Failed to process label command: ${err.message}`);
            }
