name: Label via slash comment
on:
  workflow_call: 

jobs:
  add-label:
    if: startsWith(github.event.comment.body, '/') && !contains(github.event.comment.body, ' ')
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Verify collaborator and add label
        uses: actions/github-script@v7
        with:
          script: |
            try {
              const body = context.payload.comment.body.trim();
              const label = body.slice(1);

              if (!label) return;

              const { data: permLevel } = await github.rest.repos.getCollaboratorPermissionLevel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                username: context.payload.comment.user.login,
              });

              const allowed = ['admin', 'write'];
              if (!allowed.includes(permLevel.permission)) {
                console.log(`User ${context.payload.comment.user.login} has "${permLevel.permission}" — skipping`);
                return;
              }

              const repoLabels = await github.paginate(github.rest.issues.listLabelsForRepo, {
                owner: context.repo.owner,
                repo: context.repo.repo,
              });
              const exists = repoLabels.some(l => l.name.toLowerCase() === label.toLowerCase());

              if (!exists) {
                console.log(`Label "${label}" does not exist in the repo — skipping`);
                return;
              }

              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                labels: [label],
              });
              console.log(`Added label "${label}"`);
            } catch (err) {
              core.setFailed(`Failed to process label command: ${err.message}`);
            }
