name: Issue Management

on:
  workflow_call:

jobs:
  handle-issue:
    if: github.event_name == 'issues'
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read

    steps:
      - name: Request issue approval and assignment
        uses: actions/github-script@v7
        env: 
          REVIEWERS: "krkn-maintainers"
        with:
          script: |
            const issue = context.payload.issue;
            const action = context.payload.action;

            // 1. Auto-Triage on Issue Open
            if (action === 'opened') {

              // Standard Triage Flow (including bug issues)
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                labels: ['needs-triage']
              });

              // Post comment and tag the reviewers
              const reviewers = `@${context.repo.owner}/${process.env.REVIEWERS}`;

              const comment = `Thanks for opening this issue! A maintainer will review it shortly. Please wait for approval before starting work on a PR. See our [contributing guidelines](https://krkn-chaos.dev/docs/contribution-guidelines/) for more details. \n\nCC: ${reviewers}`;
              
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: comment
              });

              console.log(`Issue #${issue.number} labeled and reviewers notified`);
            }
            
            // 2. Maintainer Approval Flow
            if (action === 'labeled') {
              if (context.payload.label.name !== 'triage/accepted') {
                console.log(`Label ${context.payload.label.name} added - no action needed`);
                return;
              }
              
              // Remove needs-triage
              try {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  name: 'needs-triage'
                });
                console.log(`Removed 'needs-triage' label from issue #${issue.number}`);
              } catch (error) {
                console.log(`Error removing label: ${error.message}`);
                }

              const comment = `This issue has been approved and assigned by a maintainer! If you are the assignee, please submit a PR within 14 days using Fixes #<issue_number> in the PR description. If no PR is submitted, the issue will be opened up for other contributors.`;

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: comment
              });

              console.log(`Issue #${issue.number} has been assigned`); }
              
  
