name: Close inactive issues and pull requests
on:
  workflow_call:

jobs:
  close-issue:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Check for maintainer response
        uses: actions/github-script@v7
        env:
          REVIEWERS: "krkn-maintainers"
        with:
          script: |
            const thirty_days = 0.001;   // TEST ONLY — was 30
            const fourteen_days = 0.001; // TEST ONLY — was 14
            const reviewers = `@${context.repo.owner}/${process.env.REVIEWERS}`;

            // Fetch all open issues
            const {data: issues} = await github.rest.issues.listForRepo({
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'open',
                per_page: 100
            });

            console.log(`Found ${issues.length} open issues to check`);

            for (const issue of issues) {
                if (issue.pull_request) {
                  console.log(`Skipping PR #${issue.number}`);
                  continue;
                }

                // Timeline events for an issue
                const {data: timelineEvents} = await github.rest.issues.listEventsForTimeline({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: issue.number,
                    per_page: 100
                });

                // Check for needs-triage label
                const needsTriageEvent = timelineEvents.find(event =>
                  event.event === 'labeled' && event.label?.name === 'needs-triage'
                );

                if (needsTriageEvent) {
                    const labelAddedAt = new Date(needsTriageEvent.created_at);
                    const daysSinceLabel = (Date.now() - labelAddedAt) / (24 * 60 * 60 * 1000);

                    if (daysSinceLabel >= fourteen_days) {
                        console.log(`Issue #${issue.number} needs triage for ${daysSinceLabel.toFixed(4)} days`);

                        const comment = `Apologies on the delay! There are many issues awaiting triage. This issue has been waiting for ${Math.floor(daysSinceLabel)} days. Can maintainers please review this issue at their convenience? \n\nCC: ${reviewers}`;
                        await github.rest.issues.createComment({
                            owner: context.repo.owner,
                            repo: context.repo.repo,
                            issue_number: issue.number,
                            body: comment
                        });
                    }
                }

                // Check for triage/accepted label
                const triageAcceptedEvent = timelineEvents.find(event =>
                  event.event === 'labeled' && event.label?.name === 'triage/accepted'
                );

                if (triageAcceptedEvent) {
                    const labelAddedAt = new Date(triageAcceptedEvent.created_at);
                    const daysSinceLabel = (Date.now() - labelAddedAt) / (24 * 60 * 60 * 1000);

                    if (daysSinceLabel >= thirty_days) {
                        // Check if a PR is already linked by looking for references in timeline
                        const prReferences = timelineEvents.filter(event =>
                          event.event === 'cross-referenced' &&
                          event.source?.issue?.pull_request
                        );

                        if (prReferences.length > 0) {
                          console.log(`Issue #${issue.number} has linked PR, skipping reminder`);
                          continue;
                        }

                        console.log(`Issue #${issue.number} accepted for ${daysSinceLabel.toFixed(4)} days, no PR linked - closing`);

                        const assignee = issue.assignee ? `@${issue.assignee.login}` : 'the assignee';
                        const comment = `Closing this issue: it was accepted ${Math.floor(daysSinceLabel)} days ago with no linked PR. Feel free to reopen if you're ready to pick this back up! \n\nCC: ${assignee}`;

                        await github.rest.issues.createComment({
                            owner: context.repo.owner,
                            repo: context.repo.repo,
                            issue_number: issue.number,
                            body: comment
                        });

                        // NEW: actually close the issue
                        await github.rest.issues.update({
                            owner: context.repo.owner,
                            repo: context.repo.repo,
                            issue_number: issue.number,
                            state: 'closed'
                        });
                    }
                }
            }
