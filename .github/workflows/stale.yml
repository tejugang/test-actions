name: Manage stale issues and PRs

on:
  workflow_call:

jobs:
  stale-check:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write

    steps:
      - name: Check for stale issues and PRs
        uses: actions/github-script@v7
        env:
          REVIEWERS: "krkn-maintainers"
        with:
          script: |
            // Production values (uncomment when done testing):
            // const STALE_ASSIGNMENT_DAYS = 14;
            // const GRACE_PERIOD_DAYS = 3;
            // const STALE_TRIAGE_DAYS = 14;
            // const STALE_APPROVED_DAYS = 30;
            // const STALE_PR_DAYS = 14;
            // const MS_PER_DAY = 24 * 60 * 60 * 1000;

            // Testing values (1 minute thresholds):
            const STALE_ASSIGNMENT_DAYS = 1 / (24 * 60);
            const GRACE_PERIOD_DAYS = 1 / (24 * 60);
            const STALE_TRIAGE_DAYS = 1 / (24 * 60);
            const STALE_APPROVED_DAYS = 1 / (24 * 60);
            const STALE_PR_DAYS = 1 / (24 * 60);

            const MS_PER_DAY = 24 * 60 * 60 * 1000;
            const now = Date.now();
            const reviewers = `@${context.repo.owner}/${process.env.REVIEWERS}`;

            function daysSince(dateStr) {
              return (now - new Date(dateStr).getTime()) / MS_PER_DAY;
            }

            async function hasCommentMarker(issueNumber, marker) {
              const { data: comments } = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                per_page: 100
              });
              return comments.some(c => c.body.includes(marker));
            }

            async function postComment(issueNumber, marker, body) {
              if (await hasCommentMarker(issueNumber, marker)) {
                console.log(`Skipping duplicate comment on #${issueNumber} (${marker})`);
                return;
              }
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                body: `<!-- ${marker} -->\n${body}`
              });
            }

            // ─── Issues ───

            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100
            });

            for (const issue of issues) {
              if (issue.pull_request) continue;

              const { data: timeline } = await github.rest.issues.listEventsForTimeline({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                per_page: 100
              });

              const labels = issue.labels.map(l => l.name);
              const hasLinkedPR = timeline.some(e =>
                e.event === 'cross-referenced' && e.source?.issue?.pull_request
              );

              // 1. Stale assignment grace period expired
              if (labels.includes('stale-assignment')) {
                const staleEvent = [...timeline].reverse().find(e =>
                  e.event === 'labeled' && e.label?.name === 'stale-assignment'
                );
                if (!staleEvent) continue;

                const daysSinceStale = daysSince(staleEvent.created_at);

                // Check if assignee responded since the label was added
                const staleTime = new Date(staleEvent.created_at).getTime();
                const assigneeLogins = issue.assignees.map(a => a.login);
                const assigneeResponded = timeline.some(e =>
                  e.event === 'commented' &&
                  assigneeLogins.includes(e.actor?.login) &&
                  new Date(e.created_at).getTime() > staleTime
                );

                if (assigneeResponded) {
                  // Assignee responded — remove stale-assignment
                  try {
                    await github.rest.issues.removeLabel({
                      owner: context.repo.owner,
                      repo: context.repo.repo,
                      issue_number: issue.number,
                      name: 'stale-assignment'
                    });
                    console.log(`#${issue.number}: assignee responded, removed stale-assignment`);
                  } catch (e) {
                    console.log(`#${issue.number}: error removing stale-assignment: ${e.message}`);
                  }
                  continue;
                }

                if (daysSinceStale >= GRACE_PERIOD_DAYS) {
                  // Grace period expired — unassign, relabel
                  for (const assignee of assigneeLogins) {
                    await github.rest.issues.removeAssignees({
                      owner: context.repo.owner,
                      repo: context.repo.repo,
                      issue_number: issue.number,
                      assignees: [assignee]
                    });
                  }

                  try {
                    await github.rest.issues.removeLabel({
                      owner: context.repo.owner,
                      repo: context.repo.repo,
                      issue_number: issue.number,
                      name: 'stale-assignment'
                    });
                  } catch (e) {
                    console.log(`#${issue.number}: error removing stale-assignment: ${e.message}`);
                  }

                  await github.rest.issues.addLabels({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: issue.number,
                    labels: ['help-wanted']
                  });

                  await postComment(issue.number, 'stale-assignment-expired',
                    `You have been unassigned due to inactivity. This issue is now open for other contributors — feel free to claim it!`
                  );

                  console.log(`#${issue.number}: grace period expired, unassigned and added help-wanted`);
                }
                continue;
              }

              // 2. Stale assignment — assigned + triage/accepted, no PR after threshold
              if (labels.includes('triage/accepted') && issue.assignees.length > 0 && !hasLinkedPR) {
                const assignEvent = [...timeline].reverse().find(e =>
                  e.event === 'assigned' && issue.assignees.some(a => a.login === e.assignee?.login)
                );
                if (assignEvent && daysSince(assignEvent.created_at) >= STALE_ASSIGNMENT_DAYS) {
                  await github.rest.issues.addLabels({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: issue.number,
                    labels: ['stale-assignment']
                  });

                  const assignee = `@${issue.assignees[0].login}`;
                  await postComment(issue.number, 'stale-assignment-reminder',
                    `Hi ${assignee}, it's been ${STALE_ASSIGNMENT_DAYS} days since you were assigned to this issue and no PR has been submitted. Are you still working on this? Please respond within ${GRACE_PERIOD_DAYS} days, otherwise you'll be unassigned so others can pick it up.`
                  );

                  console.log(`#${issue.number}: stale assignment, reminded ${assignee}`);
                }
                continue;
              }

              // 3. Stale triage — needs-triage for threshold days
              if (labels.includes('needs-triage')) {
                const triageEvent = timeline.find(e =>
                  e.event === 'labeled' && e.label?.name === 'needs-triage'
                );
                if (triageEvent && daysSince(triageEvent.created_at) >= STALE_TRIAGE_DAYS) {
                  await postComment(issue.number, 'stale-triage-reminder',
                    `Reminder: this issue has been awaiting triage for ${Math.floor(daysSince(triageEvent.created_at))} days. ${reviewers} could you please review when you get a chance?`
                  );
                  console.log(`#${issue.number}: stale triage reminder`);
                }
                continue;
              }

              // 4. Stale approved issue — triage/accepted, no PR, no assignee
              if (labels.includes('triage/accepted') && issue.assignees.length === 0 && !hasLinkedPR) {
                const acceptedEvent = timeline.find(e =>
                  e.event === 'labeled' && e.label?.name === 'triage/accepted'
                );
                if (acceptedEvent && daysSince(acceptedEvent.created_at) >= STALE_APPROVED_DAYS) {
                  await postComment(issue.number, 'stale-approved-reminder',
                    `This issue has been approved but no PR has been submitted in ${Math.floor(daysSince(acceptedEvent.created_at))} days. It is still open for contributors — feel free to pick it up!`
                  );
                  console.log(`#${issue.number}: stale approved issue reminder`);
                }
              }
            }

            // ─── Pull Requests ───

            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100
            });

            for (const pr of prs) {
              const daysSinceUpdate = daysSince(pr.updated_at);

              if (daysSinceUpdate >= STALE_PR_DAYS) {
                const contributor = `@${pr.user.login}`;
                await postComment(pr.number, 'stale-pr-reminder',
                  `Hi ${contributor}, this PR has been waiting for updates for ${Math.floor(daysSinceUpdate)} days. Please respond or push changes within 7 days, otherwise this PR will be closed. Feel free to reopen when you're ready to continue.`
                );
                console.log(`PR #${pr.number}: stale, reminded ${contributor}`);
              }
            }
